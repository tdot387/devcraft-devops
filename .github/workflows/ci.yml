name: CI- our DevCraft project pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test Clemens's app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npx prisma generate
      - run: npm test